<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Smart Q&A</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-bubble {
            max-width: 80%;
            margin: 10px 0;
        }
        .user-bubble {
            margin-left: auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .ai-bubble {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .loading {
            display: none;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-500 via-pink-500 to-red-500 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <div class="inline-flex items-center bg-white/20 backdrop-blur-lg rounded-full p-4 mb-6">
                <i class="fas fa-robot text-3xl text-white mr-4"></i>
                <h1 class="text-4xl md:text-5xl font-bold text-white drop-shadow-lg">
                    AI Agent
                </h1>
            </div>
            <p class="text-xl text-white/90 drop-shadow-md">Ask me anything! I learn from every question.</p>
        </div>

        <!-- Stats -->
        <div class="grid md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white/20 backdrop-blur-lg rounded-2xl p-6 text-center text-white">
                <i class="fas fa-database text-3xl mb-2"></i>
                <div id="total-questions" class="text-2xl font-bold">0</div>
                <div>Total Questions</div>
            </div>
            <div class="bg-white/20 backdrop-blur-lg rounded-2xl p-6 text-center text-white">
                <i class="fas fa-brain text-3xl mb-2"></i>
                <div id="unique-questions" class="text-2xl font-bold">0</div>
                <div>Unique Qs</div>
            </div>
            <div class="bg-white/20 backdrop-blur-lg rounded-2xl p-6 text-center text-white">
                <i class="fas fa-bolt text-3xl mb-2"></i>
                <div id="cache-hits" class="text-2xl font-bold">0%</div>
                <div>Cache Hit Rate</div>
            </div>
        </div>

        <!-- Chat Interface -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl">
            <div id="chat-container" class="h-96 md:h-[500px] overflow-y-auto mb-6 p-4 space-y-4 bg-white/5 rounded-2xl">
                <div class="text-center text-white/70 italic py-8">
                    <i class="fas fa-comments text-4xl mb-4 block"></i>
                    <p>Ask your first question to get started!</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="flex gap-3">
                <div class="flex-1 relative">
                    <input 
                        type="text" 
                        id="question-input"
                        class="w-full px-6 py-4 bg-white/20 border border-white/30 rounded-2xl text-white placeholder-white/70 focus:outline-none focus:ring-4 focus:ring-white/30 transition-all duration-300 text-lg backdrop-blur-lg"
                        placeholder="Ask me anything..."
                    >
                    <div id="loading-spinner" class="loading absolute right-4 top-1/2 transform -translate-y-1/2">
                        <i class="fas fa-spinner fa-spin text-white"></i>
                    </div>
                </div>
                <button 
                    id="ask-btn"
                    class="bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white px-8 py-4 rounded-2xl font-bold text-lg transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-xl flex items-center gap-2"
                >
                    <i class="fas fa-paper-plane"></i>
                    Ask
                </button>
            </div>
        </div>

        <!-- Clear Cache Button -->
        <div class="text-center mt-8">
            <button 
                id="clear-cache"
                class="bg-red-500/80 hover:bg-red-600 text-white px-8 py-3 rounded-xl font-semibold transition-all duration-300 hover:scale-105 shadow-lg"
            >
                <i class="fas fa-trash mr-2"></i>
                Clear Cache
            </button>
        </div>
    </div>

    <script>
        let chatHistory = [];

        // Load stats on page load
        loadStats();

        document.getElementById('ask-btn').addEventListener('click', sendQuestion);
        document.getElementById('question-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendQuestion();
        });

        document.getElementById('clear-cache').addEventListener('click', clearCache);

        async function sendQuestion() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            
            if (!question) return;

            // Add user message
            addMessage(question, 'user');
            input.value = '';

            // Show loading
            showLoading();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                // Hide loading
                hideLoading();

                // Add AI response
                addMessage(data.answer, 'ai', data);
                
                // Scroll to bottom
                scrollToBottom();
            } catch (error) {
                hideLoading();
                addMessage('Sorry, I encountered an error. Please try again.', 'ai', { error: true });
            }
        }

        function addMessage(text, sender, data = {}) {
            const container = document.getElementById('chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-bubble fade-in ${sender === 'user' ? 'user-bubble' : 'ai-bubble'} p-4 rounded-2xl text-white shadow-lg`;

            let content = `<div class="text-sm opacity-90">${text}</div>`;

            if (sender === 'ai' && data.source) {
                const sourceIcon = data.source === 'cache' ? 
                    '<i class="fas fa-database mr-1"></i>' : 
                    '<i class="fas fa-search mr-1"></i>';
                content += `<div class="text-xs mt-2 opacity-75 flex items-center justify-end">${sourceIcon}${data.message}</div>`;
            }

            messageDiv.innerHTML = content;
            container.appendChild(messageDiv);
        }

        function showLoading() {
            document.getElementById('loading-spinner').style.display = 'block';
            document.getElementById('ask-btn').disabled = true;
        }

        function hideLoading() {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('ask-btn').disabled = false;
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            container.scrollTop = container.scrollHeight;
        }

        async function loadStats() {
            try {
                const response = await fetch('/stats');
                const stats = await response.json();
                
                document.getElementById('total-questions').textContent = stats.total_questions;
                document.getElementById('unique-questions').textContent = stats.unique_questions;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function clearCache() {
            if (confirm('Are you sure you want to clear the entire cache?')) {
                // Note: This is a simple implementation. You might want to add a proper API endpoint
                location.reload();
            }
        }
    </script>
</body>
</html>
